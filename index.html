<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hearthwood Master Sanctuary</title>

<style>
body { font-family: Arial; background:#0a0e0a; color:#e8dcc8; }
.row { display:flex; gap:10px; padding:10px; cursor:pointer; }
.done span { text-decoration: line-through; opacity:0.4; }
.checkbox { width:20px; height:20px; border:1px solid gold; }
.done .checkbox { background:gold; }
</style>
</head>

<body>

<h2>Hearthwood</h2>

<h3>Cleaning</h3>
<div id="cleaning-checklist"></div>

<h3>Notes</h3>
<textarea id="daily-notes"></textarea>

<h3>Budget</h3>
<p>$<span id="budget-num"></span></p>
<input type="number" id="spend-amount">
<button onclick="logSpend()">Spend</button>

<h3>Saved</h3>
<p>$<span id="saved-num"></span></p>
<button onclick="logRefused()">Refused Spend</button>

<h3>Mood</h3>
<div>
<span class="mood-btn" onclick="setMood(this)">😊</span>
<span class="mood-btn" onclick="setMood(this)">😴</span>
<span class="mood-btn" onclick="setMood(this)">🔥</span>
</div>

<script>
const cleaningTasks = [
"Make bed",
"Laundry",
"Sweep",
"Dishes"
];

let state = JSON.parse(localStorage.getItem('hw_state')) || {
budget: 900,
savings: 0,
lastReset: Date.now(),
mood: null
};

function init() {

const now = new Date();
const last = new Date(state.lastReset);

// Weekly reset Sunday
if (now.getDay() === 0 && now - last > 86400000) {
state.budget = 900;
state.lastReset = Date.now();
saveState();
}

// Load checklist
document.getElementById('cleaning-checklist').innerHTML =
cleaningTasks.map((t,i)=>{
const saved = localStorage.getItem('task_'+i)==='true';
return `
<div class="row ${saved?'done':''}" onclick="toggleTask(this,'task_${i}')">
<div class="checkbox"></div>
<span>${t}</span>
</div>`;
}).join('');

// Load notes
const notes = document.getElementById('daily-notes');
notes.value = localStorage.getItem('notes') || '';
notes.oninput = e => localStorage.setItem('notes', e.target.value);

// Restore mood
if(state.mood){
document.querySelectorAll('.mood-btn').forEach(b=>{
if(b.innerText===state.mood) b.style.opacity=1;
});
}

updateUI();
}

function toggleTask(el,key){
el.classList.toggle('done');
localStorage.setItem(key, el.classList.contains('done'));
}

function logSpend(){
let amt = parseFloat(document.getElementById('spend-amount').value);
if(!amt) return;

if(state.budget - amt < 0){
alert("Over budget!");
return;
}

state.budget -= amt;
saveState();
updateUI();
}

function logRefused(){
let amt = prompt("Amount?");
if(!amt) return;
state.savings += parseFloat(amt);
saveState();
updateUI();
}

function setMood(el){
document.querySelectorAll('.mood-btn').forEach(b=>b.style.opacity=0.3);
el.style.opacity=1;
state.mood = el.innerText;
saveState();
}

function updateUI(){
document.getElementById('budget-num').innerText = state.budget.toFixed(2);
document.getElementById('saved-num').innerText = state.savings.toFixed(2);
}

function saveState(){
localStorage.setItem('hw_state', JSON.stringify(state));
}

init();
</script>

</body>
</html>
