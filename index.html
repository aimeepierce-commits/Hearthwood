<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Hearthwood v2.5</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Cinzel:wght@400;500&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d120e; --card: #161d17; --gold: #c9a96e; --text: #e8dcc8;
    --accent: #4a5e3a; --danger: #a64444; --success: #6b7f55;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background-color: var(--bg); color: var(--text); font-family: 'Lato', sans-serif; }
  
  .main { padding: 20px 16px 120px; max-width: 450px; margin: 0 auto; }
  .header { text-align: center; padding: 30px 0; border-bottom: 1px solid rgba(201, 169, 110, 0.1); }
  .header h1 { font-family: 'Cinzel', serif; font-size: 18px; letter-spacing: 5px; color: var(--gold); }

  /* --- SAVINGS JAR --- */
  .jar-section { text-align: center; margin: 20px 0; }
  .jar-container { 
    width: 140px; height: 180px; margin: 0 auto; border: 3px solid var(--gold); 
    border-radius: 20px 20px 40px 40px; position: relative; overflow: hidden;
    background: rgba(255,255,255,0.02);
  }
  .jar-fill { 
    position: absolute; bottom: 0; left: 0; width: 100%; 
    background: linear-gradient(to top, var(--gold), #e8c98a); 
    transition: height 1s ease-out; height: 30%; 
  }
  .jar-label { margin-top: 10px; font-family: 'Cinzel'; font-size: 12px; color: var(--gold); }

  /* --- PIE CHART --- */
  .chart-card { background: var(--card); border-radius: 15px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); }
  .pie-chart {
    width: 150px; height: 150px; border-radius: 50%; margin: 0 auto;
    background: conic-gradient(
      var(--success) 0% 40%, 
      var(--accent) 40% 70%, 
      var(--danger) 70% 100%
    );
  }
  .chart-legend { display: flex; justify-content: space-around; margin-top: 15px; font-size: 10px; font-family: 'Cinzel'; }

  /* --- COACH ADVICE --- */
  .coach-box { background: rgba(201, 169, 110, 0.05); border-left: 3px solid var(--gold); padding: 15px; margin-bottom: 20px; }
  .coach-title { font-family: 'Cinzel'; font-size: 10px; color: var(--gold); margin-bottom: 8px; letter-spacing: 1px; }
  .coach-text { font-family: 'Cormorant Garamond'; font-size: 16px; font-style: italic; line-height: 1.4; }

  /* --- FORMS --- */
  .input-group { margin-bottom: 15px; }
  .input-group label { display: block; font-family: 'Cinzel'; font-size: 9px; color: var(--gold); margin-bottom: 5px; }
  input { background: none; border: none; border-bottom: 1px solid var(--accent); color: white; width: 100%; padding: 8px 0; font-size: 16px; outline: none; }

  /* --- NAV --- */
  .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--bg); display: flex; justify-content: space-around; padding: 20px; border-top: 1px solid rgba(201, 169, 110, 0.2); }
  .nav-item { font-family: 'Cinzel'; font-size: 10px; color: var(--gold); cursor: pointer; text-decoration: none; }
  .hidden { display: none; }
</style>
</head>
<body>

<div class="header">
  <h1>HEARTHWOOD</h1>
</div>

<div class="main">
  <div id="home-page">
    <div class="jar-section">
      <div class="jar-container"><div id="jarFill" class="jar-fill"></div></div>
      <div class="jar-label">Total Avoided Spend: <span id="jarAmount">$0</span></div>
    </div>

    <div class="coach-box">
      <div class="coach-title">Weekly Coach Analysis</div>
      <div class="coach-text" id="coachAdvice">Add receipts to begin your 14-day learning phase.</div>
    </div>

    <div class="chart-card">
      <div class="pie-chart"></div>
      <div class="chart-legend">
        <span>● Groceries</span>
        <span>● Household</span>
        <span>● Subs</span>
      </div>
    </div>
  </div>

  <div id="finance-page" class="hidden">
    <div class="chart-card">
      <div class="input-group">
        <label>Upload Receipt Photo / Screenshot</label>
        <input type="file" accept="image/*" id="receiptFile">
      </div>
      <div class="input-group">
        <label>Store Name (e.g. Coles, Netflix)</label>
        <input type="text" id="storeName" placeholder="Where did you spend?">
      </div>
      <div class="input-group">
        <label>Amount ($)</label>
        <input type="number" id="spendAmount" placeholder="0.00">
      </div>
      <button class="btn-gold" style="background:var(--gold); color:var(--bg); border:none; padding:12px; width:100%; font-family:'Cinzel'; font-size:10px; border-radius:5px;" onclick="addReceipt()">Log Transaction</button>
    </div>

    <div class="section-label" style="font-family:'Cinzel'; font-size:10px; color:var(--gold); margin: 20px 0 10px;">Australian Subscription Deals</div>
    <div class="coach-box" style="border-left-color: var(--success);">
        <div class="coach-text" style="font-size:14px;">Paramount+: 60% OFF deal detected. Switch to annual or new email to save.</div>
    </div>
  </div>
</div>

<div class="bottom-nav">
  <div class="nav-item" onclick="showPage('home')">Dashboard</div>
  <div class="nav-item" onclick="showPage('finance')">Finances</div>
  <div class="nav-item" onclick="showPage('routine')">Routine</div>
</div>

<script>
  let totalSaved = localStorage.getItem('totalSaved') || 0;

  function showPage(id) {
    document.querySelectorAll('.main > div').forEach(p => p.classList.add('hidden'));
    document.getElementById(id + '-page').classList.remove('hidden');
    updateJar();
  }

  function addReceipt() {
    const store = document.getElementById('storeName').value.toLowerCase();
    const amount = parseFloat(document.getElementById('spendAmount').value);
    
    // Simple logic for the "Coach"
    if (store.includes('paramount') && amount > 5) {
        alert("Coach Tip: You're paying full price for Paramount. Check the 60% off deal online!");
    }
    
    // Visual feedback
    alert("Receipt logged for analysis.");
    document.getElementById('storeName').value = '';
    document.getElementById('spendAmount').value = '';
  }

  function updateJar() {
    const fill = document.getElementById('jarFill');
    const display = document.getElementById('jarAmount');
    // Simple visual simulation
    let height = Math.min(100, (totalSaved / 500) * 100); 
    fill.style.height = height + '%';
    display.textContent = '$' + totalSaved;
  }

  window.onload = updateJar;
</script>
</body>
</html>
