<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hearthwood Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Cinzel:wght@400;500&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0e0a; --card: #121812; --gold: #c9a96e; --text: #e8dcc8; --border: rgba(201, 169, 110, 0.2); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Lato', sans-serif; min-height: 100vh; padding-bottom: 80px; }
        
        /* HEADER & IDENTITY */
        .identity-header { background: linear-gradient(180deg, #121812 0%, #0a0e0a 100%); padding: 40px 10px 20px; border-bottom: 1px solid var(--border); text-align: center; }
        .app-title { font-family: 'Cinzel', serif; font-size: 24px; letter-spacing: 10px; color: var(--gold); margin-bottom: 25px; }
        
        .medallion-row { display: flex; justify-content: center; gap: 15px; }
        .medallion { flex: 1; max-width: 90px; border: 1px solid var(--border); padding: 10px 5px; border-radius: 40px 40px 10px 10px; background: rgba(201,169,110,0.03); }
        .medallion svg { width: 24px; height: 24px; stroke: var(--gold); margin-bottom: 8px; stroke-width: 1.5; fill: none; }
        .medallion .label { font-family: 'Cinzel'; font-size: 7px; color: var(--gold); letter-spacing: 1px; display: block; margin-bottom: 2px; opacity: 0.7; }
        .medallion .sign { font-family: 'Cinzel'; font-size: 8px; color: var(--gold); font-weight: 500; }

        .main { padding: 20px 16px; max-width: 500px; margin: 0 auto; }
        .section-label { font-family: 'Cinzel', serif; font-size: 9px; letter-spacing: 3px; color: var(--gold); margin: 35px 0 12px; text-transform: uppercase; border-bottom: 1px solid var(--border); padding-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
        
        /* CONTENT CARDS */
        .visual-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .card-img { height: 100px; width: 100%; background-size: cover; background-position: center; opacity: 0.4; filter: grayscale(50%); border-bottom: 1px solid var(--border); }
        .card-content { padding: 20px; }

        /* LISTS & INPUTS */
        .row { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .checkbox { width: 18px; height: 18px; border: 1px solid var(--gold); border-radius: 4px; flex-shrink: 0; }
        .done { opacity: 0.3; text-decoration: line-through; filter: grayscale(1); }
        
        input, textarea { width: 100%; background: rgba(0,0,0,0.4); border: 1px solid var(--border); color: var(--text); padding: 12px; border-radius: 8px; font-family: 'Cormorant Garamond'; font-size: 16px; margin-top: 8px; outline: none; }
        .btn-link { background: none; border: 1px solid var(--gold); color: var(--gold); font-family: 'Cinzel'; font-size: 8px; padding: 8px 12px; border-radius: 5px; text-decoration: none; display: inline-block; margin-top: 10px; }

        /* THE SAVINGS JAR */
        .finance-flex { display: flex; align-items: center; gap: 20px; }
        .jar { width: 45px; height: 70px; border: 2px solid var(--gold); border-radius: 5px 5px 15px 15px; position: relative; overflow: hidden; background: rgba(201,169,110,0.05); }
        .jar-fill { position: absolute; bottom: 0; width: 100%; background: linear-gradient(to top, #c9a96e, #e8c98a); transition: height 0.8s ease; }
    </style>
</head>
<body>

<div class="identity-header">
    <div class="app-title">HEARTHWOOD</div>
    <div class="medallion-row">
        <div class="medallion">
            <svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="18"/><path d="M50 10v10m0 60v10M10 50h10m60 0h10M22 22l7 7m42 42l7 7m0-56l-7 7m-42 42l-7 7"/></svg>
            <span class="label">SUN</span><span class="sign">GEMINI</span>
        </div>
        <div class="medallion">
            <svg viewBox="0 0 100 100"><path d="M35 50 Q50 30 65 50 Q50 70 35 50"/><path d="M50 15v70M25 35h50M25 65h50"/></svg>
            <span class="label">ASC</span><span class="sign">CANCER</span>
        </div>
        <div class="medallion">
            <svg viewBox="0 0 100 100"><path d="M70 30 A30 30 0 1 0 70 70 A25 25 0 1 1 70 30"/></svg>
            <span class="label">MOON</span><span class="sign">AQUARIUS</span>
        </div>
    </div>
</div>

<div class="main">
    
    <div class="section-label">✦ Today's Calendar <a href="https://calendar.google.com" target="_blank" class="btn-link">LAUNCH</a></div>
    <div class="visual-card">
        <div class="card-img" style="background-image: url('https://images.unsplash.com/photo-1506784365847-bbad939e9335?q=80&w=500')"></div>
        <div class="card-content">
            <textarea id="cal-events" placeholder="What's happening today? (School, Appointments, Reminders)" rows="3"></textarea>
        </div>
    </div>

    <div class="section-label">✦ Cleaning Rhythm</div>
    <div class="visual-card">
        <div class="card-img" style="background-image: url('https://images.unsplash.com/photo-1584622650111-993a426fbf0a?q=80&w=500')"></div>
        <div class="card-content" id="cleaning-checklist">
            </div>
    </div>

    <div class="section-label">✦ Nourishment</div>
    <div class="visual-card">
        <div class="card-img" style="background-image: url('https://images.unsplash.com/photo-1495521821757-a1efb6729352?q=80&w=500')"></div>
        <div class="card-content">
            <div id="school-lunch-box" class="hidden">
                <span style="font-family:'Cinzel'; font-size:9px; color:var(--gold);">SCHOOL LUNCH</span>
                <input type="text" id="lunch-val" placeholder="Pack something fresh...">
                <div style="margin-bottom:15px;"></div>
            </div>
            <span style="font-family:'Cinzel'; font-size:9px; color:var(--gold);">DINNER TONIGHT</span>
            <input type="text" id="dinner-val" placeholder="What's cooking?">
        </div>
    </div>

    <div class="section-label">✦ Savings Jar</div>
    <div class="visual-card">
        <div class="card-img" style="background-image: url('https://images.unsplash.com/photo-1579621970563-ebec7560ff3e?q=80&w=500')"></div>
        <div class="card-content finance-flex">
            <div class="jar"><div id="jar-lvl" class="jar-fill" style="height: 0%;"></div></div>
            <div style="flex:1;">
                <p style="font-family:'Cinzel'; font-size:11px;">Total Refused: $<span id="save-total">0.00</span></p>
                <button onclick="logSpend()" style="background:none; border:none; color:var(--gold); font-size:10px; text-decoration:underline; cursor:pointer; margin-top:5px;">+ Log Saved Amount</button>
            </div>
        </div>
    </div>

</div>

<script>
    const routine = {
        0: ["🛌 Change Sheets", "🧺 Sunday Laundry", "🍽️ Dishes"],
        1: ["🛌 Make Bed", "🧹 Sweep & Mop", "🍽️ Dishes"],
        2: ["🛌 Make Bed", "🧼 Clean Bathrooms", "🍽️ Dishes"],
        3: ["🛌 Make Bed", "✨ Dust Surfaces", "🍽️ Dishes"],
        4: ["🛌 Make Bed", "🥦 Grocery Prep", "🍽️ Dishes"],
        5: ["🛌 Make Bed", "🧺 Full Laundry", "🍽️ Dishes"],
        6: ["🛌 Make Bed", "🌿 Garden Care", "🍽️ Dishes"]
    };

    function init() {
        const d = new Date();
        const dayNum = d.getDay();
        
        // 1. Cleaning List
        document.getElementById('cleaning-checklist').innerHTML = routine[dayNum].map(t => `
            <div class="row" onclick="this.classList.toggle('done')"><div class="checkbox"></div><span>${t}</span></div>
        `).join('');

        // 2. School Day Logic
        if (dayNum >= 1 && dayNum <= 5) {
            document.getElementById('school-lunch-box').classList.remove('hidden');
        }

        // 3. Finance Update
        const saved = localStorage.getItem('hw_savings') || 0;
        document.getElementById('save-total').innerText = parseFloat(saved).toFixed(2);
        document.getElementById('jar-lvl').style.height = Math.min(saved/10, 100) + '%';
        
        // 4. Persistence
        ['cal-events', 'lunch-val', 'dinner-val'].forEach(id => {
            document.getElementById(id).value = localStorage.getItem(id) || '';
            document.getElementById(id).oninput = (e) => localStorage.setItem(id, e.target.value);
        });
    }

    function logSpend() {
        let val = prompt("How much did you choose NOT to spend?");
        if(val) {
            let current = parseFloat(localStorage.getItem('hw_savings') || 0);
            localStorage.setItem('hw_savings', current + parseFloat(val));
            location.reload();
        }
    }

    init();
</script>

</body>
</html>
