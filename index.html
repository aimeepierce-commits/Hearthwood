<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hearthwood Sanctuary</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300;0,400&family=Cinzel:wght@400;500&family=Lato:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #080a08; --card: #101410; --gold: #c9a96e; --text: #e8dcc8; --border: rgba(201, 169, 110, 0.2); }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Lato', sans-serif; line-height: 1.6; min-height: 100vh; }

        .header { padding: 40px 20px 20px; text-align: center; border-bottom: 1px solid var(--border); background: var(--bg); position: sticky; top: 0; z-index: 100; }
        .app-title { font-family: 'Cinzel', serif; font-size: 22px; letter-spacing: 10px; color: var(--gold); margin-bottom: 25px; cursor: pointer; }
        .medallion-row { display: flex; justify-content: center; gap: 10px; }
        .medallion { flex: 1; max-width: 85px; border: 1px solid var(--border); padding: 10px 5px; border-radius: 30px 30px 10px 10px; background: rgba(201,169,110,0.03); text-align: center; }
        .medallion svg { width: 18px; height: 18px; stroke: var(--gold); fill: none; margin-bottom: 5px; }
        .medallion .sign { font-family: 'Cinzel'; font-size: 8px; color: var(--gold); display: block; }

        #home-screen { padding: 20px; max-width: 600px; margin: 0 auto; padding-bottom: 100px; }
        .daily-briefing { background: var(--card); border: 1px solid var(--gold); border-radius: 15px; padding: 20px; margin-bottom: 30px; border-left-width: 4px; box-shadow: 0 15px 40px rgba(0,0,0,0.8); }
        .briefing-title { font-family: 'Cinzel'; font-size: 10px; letter-spacing: 3px; color: var(--gold); margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }

        .nav-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .nav-card { background: #1a1f1a; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; position: relative; height: 105px; display: flex; align-items: flex-end; padding: 12px; cursor: pointer; }
        .nav-card img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.5; z-index: 1; filter: brightness(0.5) contrast(1.2); }
        .nav-card span { position: relative; z-index: 2; font-family: 'Cinzel'; font-size: 8px; letter-spacing: 2px; color: var(--gold); width: 100%; text-align: center; text-shadow: 2px 2px 4px #000; font-weight: 500; }

        .page { display: none; padding: 20px; max-width: 600px; margin: 0 auto; animation: fadeIn 0.4s ease; padding-bottom: 100px; }
        .page.active { display: block; }
        .back-btn { color: var(--gold); font-family: 'Cinzel'; font-size: 10px; letter-spacing: 2px; margin-bottom: 25px; cursor: pointer; display: inline-block; }
        .hero-img { width: 100%; height: 240px; border-radius: 15px; object-fit: cover; border: 1px solid var(--border); margin-bottom: 30px; opacity: 0.8; }
        .section-title { font-family: 'Cinzel'; font-size: 14px; letter-spacing: 5px; color: var(--gold); margin-bottom: 25px; border-bottom: 1px solid var(--border); padding-bottom: 12px; }

        .row { display: flex; align-items: center; gap: 15px; padding: 18px 0; border-bottom: 1px solid rgba(255,255,255,0.03); cursor: pointer; }
        .checkbox { width: 22px; height: 22px; border: 1.5px solid var(--gold); border-radius: 5px; position: relative; flex-shrink: 0; background: rgba(0,0,0,0.3); }
        .done .checkbox { background: var(--gold); }
        .done .checkbox::after { content: '✓'; color: #000; position: absolute; left: 5px; top: 0; font-weight: bold; font-size: 14px; }
        .done span { opacity: 0.3; text-decoration: line-through; }
        .list-text { font-size: 16px; font-weight: 300; color: rgba(232, 220, 200, 0.9); }
    </style>
</head>
<body>

    <div class="header">
        <div class="app-title" onclick="showHome()">HEARTHWOOD</div>
    </div>

    <div id="home-screen">
        <div class="nav-grid">
            <div class="nav-card" onclick="showPage('p1')"><img src="https://images.unsplash.com/photo-1502082553048-f009c37129b9?q=80&w=800"><span>1. Daily Rhythm</span></div>
            <div class="nav-card" onclick="showPage('p5')"><img src="https://images.unsplash.com/photo-1528715471579-d1bcf0ba5e83?q=80&w=800"><span>5. Spirituality</span></div>
            <div class="nav-card" onclick="showPage('p7')"><img src="https://images.unsplash.com/photo-1504148455328-c376907d081c?q=80&w=800"><span>7. Maintenance</span></div>
            <div class="nav-card" onclick="showPage('p10')"><img src="https://images.unsplash.com/photo-1519741497674-611481863552?q=80&w=800"><span>10. Family Flow</span></div>
            <div class="nav-card" onclick="showPage('p11')"><img src="https://images.unsplash.com/photo-1516979187457-637abb4f9353?q=80&w=800"><span>11. Learning</span></div>
            <div class="nav-card" onclick="showPage('p12')"><img src="https://images.unsplash.com/photo-1558788353-f76d92427f16?q=80&w=800"><span>12. Pet Health</span></div>
        </div>
    </div>

    <div id="p5" class="page">
        <div class="back-btn" onclick="showHome()">← BACK HOME</div>
        <img class="hero-img" src="https://images.unsplash.com/photo-1528715471579-d1bcf0ba5e83?q=80&w=800">
        <h2 class="section-title">5. Spirituality</h2>
    </div>

    <div id="p9" class="page">
        <div class="back-btn" onclick="showHome()">← BACK HOME</div>
        <img class="hero-img" src="https://images.unsplash.com/photo-1509042239860-f550ce710b93?q=80&w=800">
        <h2 class="section-title">9. Social</h2>
    </div>

    <script>
        function showHome() {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('home-screen').style.display = 'block';
        }

        function showPage(id) {
            document.getElementById('home-screen').style.display = 'none';
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            const target = document.getElementById(id);
            if(target) target.classList.add('active');
            window.scrollTo(0,0);
        }
    </script>
</body>
</html>
